
[functions.mcp-server]
enabled = true
verify_jwt = false
import_map = "./functions/mcp-server/deno.json"
entrypoint = "./functions/mcp-server/index.ts"

[functions.mcp-client]
enabled = true
verify_jwt = false
import_map = "./functions/mcp-client/deno.json"
entrypoint = "./functions/mcp-client/index.ts"

[functions.hello-world]
enabled = true
verify_jwt = true
import_map = "./functions/hello-world/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/hello-world/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/hello-world/*.html" ]

[functions.bye-world]
enabled = true
verify_jwt = true
import_map = "./functions/bye-world/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/bye-world/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/bye-world/*.html" ]
